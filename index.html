<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Lundy Portfolio</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin: 40px 0;
      font-size: 40px;
    }

    .section {
      margin: 60px auto;
      max-width: 1200px;
    }

    .title {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    video {
      width: 100%;
      max-width: 300px;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Lundy портфолио</h1>

<div class="section">
  <div class="title">Горизонтальные видео</div>
  <div class="row">

    <video autoplay loop muted playsinline onclick="this.muted=false">
      <source src="./work1.mp4" type="video/mp4">
    </video>

    <video autoplay loop muted playsinline onclick="this.muted=false">
      <source src="./work2.mp4" type="video/mp4">
    </video>

  </div>
</div>

<div class="section">
  <div class="title">Вертикальные видео</div>
  <div class="row">

    <video autoplay loop muted playsinline onclick="this.muted=false">
      <source src="./reel1.mp4" type="video/mp4">
    </video>

    <video autoplay loop muted playsinline onclick="this.muted=false">
      <source src="./reel2.mp4" type="video/mp4">
    </video>

    <video autoplay loop muted playsinline onclick="this.muted=false">
      <source src="./reel3.mp4" type="video/mp4">
    </video>

    <video autoplay loop muted playsinline onclick="this.muted=false">
      <source src="./reel4.mp4" type="video/mp4">
    </video>

  </div>
</div>

</body>
</html>
